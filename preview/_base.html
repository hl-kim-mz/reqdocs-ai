<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  html,body{margin:0;padding:0;background:var(--color-surface);}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:12px;font-family:var(--font-sans);color:var(--color-text-body);}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .swatch{display:flex;flex-direction:column;gap:6px;font-size:11px;}
  .sw{width:72px;height:48px;border-radius:8px;border:1px solid var(--color-border);}
  .sw-name{font-weight:600;color:var(--color-text);}
  .sw-val{font-family:var(--font-mono);color:var(--color-text-sub);font-size:10px;}
  .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-sub);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;border:1px solid transparent;cursor:pointer;transition:all 150ms;}
  .btn-primary{background:var(--brand-primary);color:#fff;}
  .btn-primary:hover{background:var(--brand-primary-700);}
  .btn-secondary{background:var(--slate-100);color:var(--slate-700);}
  .btn-ghost{background:transparent;color:var(--slate-700);border:1px solid var(--slate-300);}
  .btn-primary-soft{background:var(--brand-primary-50);color:var(--brand-primary);}
  .chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;border:1px solid;font-size:11px;font-weight:500;}
</style></head><body><div class="card" id="card"></div></body></html>
