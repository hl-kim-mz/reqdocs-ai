<!DOCTYPE html>
<html lang="en" class="dark"><head><meta charset="utf-8"><title>Dark — Brand & Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  html,body{margin:0;padding:0;background:var(--color-surface-sub);}
  .card{padding:20px 24px;font-family:var(--font-sans);color:var(--color-text-body);}
  .row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;}
  .row:last-child{margin-bottom:0;}
  .swatch{display:flex;flex-direction:column;gap:4px;font-size:10px;}
  .sw{width:64px;height:46px;border-radius:8px;border:1px solid var(--color-border);}
  .sw-name{font-weight:600;color:var(--color-text);font-size:10px;}
  .sw-val{font-family:var(--font-mono);color:var(--color-text-sub);font-size:9px;}
  .eyebrow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-sub);margin-right:8px;min-width:54px;}
</style></head><body><div class="card">
  <div class="row">
    <span class="eyebrow">Brand</span>
    <div class="swatch"><div class="sw" style="background:#6366F1"></div><div class="sw-name">primary</div><div class="sw-val">#6366F1</div></div>
    <div class="swatch"><div class="sw" style="background:#818CF8"></div><div class="sw-name">hover</div><div class="sw-val">#818CF8</div></div>
    <div class="swatch"><div class="sw" style="background:#312E81"></div><div class="sw-name">tint-100</div><div class="sw-val">#312E81</div></div>
    <div class="swatch"><div class="sw" style="background:#1E1B4B"></div><div class="sw-name">tint-50</div><div class="sw-val">#1E1B4B</div></div>
    <div class="swatch"><div class="sw" style="background:#C7D2FE"></div><div class="sw-name">ink</div><div class="sw-val">#C7D2FE</div></div>
  </div>
  <div class="row">
    <span class="eyebrow">Neutrals</span>
    <div class="swatch"><div class="sw" style="background:#0B1220"></div><div class="sw-name">bg</div><div class="sw-val">#0B1220</div></div>
    <div class="swatch"><div class="sw" style="background:#111827"></div><div class="sw-name">surface</div><div class="sw-val">#111827</div></div>
    <div class="swatch"><div class="sw" style="background:#1E293B"></div><div class="sw-name">muted</div><div class="sw-val">#1E293B</div></div>
    <div class="swatch"><div class="sw" style="background:#334155"></div><div class="sw-name">border</div><div class="sw-val">#334155</div></div>
    <div class="swatch"><div class="sw" style="background:#94A3B8"></div><div class="sw-name">sub</div><div class="sw-val">#94A3B8</div></div>
    <div class="swatch"><div class="sw" style="background:#E2E8F0"></div><div class="sw-name">body</div><div class="sw-val">#E2E8F0</div></div>
    <div class="swatch"><div class="sw" style="background:#F8FAFC"></div><div class="sw-name">heading</div><div class="sw-val">#F8FAFC</div></div>
  </div>
</div></body></html>
