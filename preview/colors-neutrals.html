<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#fff;font-family:var(--font-sans);padding:22px 26px;}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.s{display:flex;flex-direction:column;gap:6px;}
.sw{width:100%;aspect-ratio:3/2;border-radius:8px;border:1px solid rgba(15,23,42,.06);}
.n{font-size:12px;font-weight:600;color:var(--color-text);}
.v{font-family:var(--font-mono);font-size:10px;color:var(--color-text-sub);}
</style></head><body>
<div class="grid">
  <div class="s"><div class="sw" style="background:#F8FAFC"></div><div class="n">slate 50</div><div class="v">#F8FAFC</div></div>
  <div class="s"><div class="sw" style="background:#F1F5F9"></div><div class="n">slate 100</div><div class="v">#F1F5F9</div></div>
  <div class="s"><div class="sw" style="background:#E2E8F0"></div><div class="n">slate 200</div><div class="v">#E2E8F0</div></div>
  <div class="s"><div class="sw" style="background:#CBD5E1"></div><div class="n">slate 300</div><div class="v">#CBD5E1</div></div>
  <div class="s"><div class="sw" style="background:#94A3B8"></div><div class="n">slate 400</div><div class="v">#94A3B8</div></div>
  <div class="s"><div class="sw" style="background:#64748B"></div><div class="n">slate 500</div><div class="v">#64748B</div></div>
  <div class="s"><div class="sw" style="background:#475569"></div><div class="n">slate 600</div><div class="v">#475569</div></div>
  <div class="s"><div class="sw" style="background:#334155"></div><div class="n">slate 700</div><div class="v">#334155</div></div>
  <div class="s"><div class="sw" style="background:#1E293B"></div><div class="n">slate 800</div><div class="v">#1E293B</div></div>
  <div class="s"><div class="sw" style="background:#0F172A"></div><div class="n">slate 900</div><div class="v">#0F172A</div></div>
</div>
</body></html>
