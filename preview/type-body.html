<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#fff;font-family:var(--font-sans);padding:22px 26px;color:var(--color-text);}
.spec{display:flex;flex-direction:column;gap:14px;}
.row{display:flex;align-items:baseline;gap:16px;}
.label{width:90px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-sub);font-weight:600;flex-shrink:0;}
.body-lg{font-size:16px;line-height:1.625;color:var(--slate-700);}
.body{font-size:14px;line-height:1.625;color:var(--slate-700);}
.sm{font-size:13px;color:var(--slate-600);}
.eyebrow{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--slate-500);}
.meta{font-size:12px;color:var(--slate-400);}
.mono{font-family:var(--font-mono);font-size:12px;color:var(--slate-400);}
.tag{font-family:var(--font-mono);font-size:10px;color:var(--slate-400);}
</style></head><body>
<div class="spec">
  <div class="row"><span class="label">Body LG</span><span class="body-lg">텍스트로 입력한 요구사항을 AI가 분석합니다.</span><span class="tag">16 / 400 / 1.625</span></div>
  <div class="row"><span class="label">Body</span><span class="body">회의록, 이메일, 기획 메모 등 자유롭게 붙여넣기</span><span class="tag">14 / 400</span></div>
  <div class="row"><span class="label">Small</span><span class="sm">요구사항을 검토한 후 문서를 생성하세요</span><span class="tag">13 / 400</span></div>
  <div class="row"><span class="label">Eyebrow</span><span class="eyebrow">문서 정보</span><span class="tag">12 / 600 / uppercase</span></div>
  <div class="row"><span class="label">Meta</span><span class="meta">2일 전 · 문서 5개</span><span class="tag">12 / 400</span></div>
  <div class="row"><span class="label">Mono</span><span class="mono">REQ-001 · POST /api/orders</span><span class="tag">Monaco 12</span></div>
</div>
</body></html>
