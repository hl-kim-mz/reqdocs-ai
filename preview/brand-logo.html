<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:linear-gradient(to bottom right,#F8FAFC,#F1F5F9);font-family:var(--font-sans);padding:22px 32px;color:#0F172A;}
.lockup{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.mark{width:48px;height:48px;border-radius:12px;background:#4F46E5;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:22px;}
.name{font-size:30px;font-weight:700;}
.name .ai{color:#64748B;font-weight:500;margin-left:6px;}
.row{display:flex;gap:24px;align-items:center;margin-top:14px;}
.wm{font-size:18px;font-weight:700;color:#4F46E5;}
.wm .ai{color:#64748B;font-weight:500;}
.flag{font-size:11px;color:#B45309;background:#FFFBEB;padding:4px 10px;border-radius:4px;border:1px solid #FDE68A;}
</style></head><body>
<div class="lockup">
  <div class="mark">R</div>
  <div class="name">ReqDocs<span class="ai">AI</span></div>
</div>
<div class="row">
  <div class="wm">ReqDocs <span class="ai">AI</span></div>
  <span class="flag">⚠ Placeholder mark — real brand ships wordmark-only</span>
</div>
</body></html>
