<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#fff;font-family:var(--font-sans);padding:22px 26px;}
.wrap{display:flex;gap:22px;align-items:stretch;}
.big{flex:1;display:flex;flex-direction:column;justify-content:flex-end;background:var(--brand-primary);color:#fff;padding:18px;border-radius:12px;min-height:130px;}
.big .h{font-size:22px;font-weight:700;}
.big .v{font-family:var(--font-mono);font-size:12px;opacity:.85;margin-top:4px;}
.ramp{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;flex:1.2;}
.s{display:flex;align-items:center;gap:10px;}
.sq{width:42px;height:42px;border-radius:8px;border:1px solid rgba(15,23,42,.06);flex-shrink:0;}
.txt .n{font-size:12px;font-weight:600;color:var(--color-text);}
.txt .v{font-family:var(--font-mono);font-size:10px;color:var(--color-text-sub);}
</style></head><body>
<div class="wrap">
  <div class="big"><div><div class="h">Indigo 600</div><div class="v">#4F46E5 · brand primary</div></div></div>
  <div class="ramp">
    <div class="s"><div class="sq" style="background:#EEF2FF"></div><div class="txt"><div class="n">indigo 50</div><div class="v">#EEF2FF</div></div></div>
    <div class="s"><div class="sq" style="background:#E0E7FF"></div><div class="txt"><div class="n">indigo 100</div><div class="v">#E0E7FF</div></div></div>
    <div class="s"><div class="sq" style="background:#C7D2FE"></div><div class="txt"><div class="n">indigo 200</div><div class="v">#C7D2FE</div></div></div>
    <div class="s"><div class="sq" style="background:#818CF8"></div><div class="txt"><div class="n">indigo 400</div><div class="v">#818CF8</div></div></div>
    <div class="s"><div class="sq" style="background:#6366F1"></div><div class="txt"><div class="n">indigo 500</div><div class="v">#6366F1</div></div></div>
    <div class="s"><div class="sq" style="background:#4338CA"></div><div class="txt"><div class="n">indigo 700</div><div class="v">#4338CA · hover</div></div></div>
  </div>
</div>
</body></html>
