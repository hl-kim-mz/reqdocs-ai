<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#F8FAFC;font-family:var(--font-sans);padding:16px 20px;color:#0F172A;}
.side{width:240px;background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:0;display:flex;flex-direction:column;overflow:hidden;}
.logo{padding:20px 22px 18px;border-bottom:1px solid #E2E8F0;font-size:18px;font-weight:700;color:#4F46E5;}
.nav{padding:14px;display:flex;flex-direction:column;gap:4px;}
.item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;font-size:14px;color:#334155;cursor:pointer;}
.item:hover{background:#F8FAFC;}
.item.active{background:#EEF2FF;color:#4F46E5;font-weight:600;}
.group{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#64748B;font-weight:600;padding:12px 14px 6px;}
.sub{font-size:13px;color:#334155;padding:6px 14px 6px 14px;display:flex;gap:8px;align-items:center;border-radius:8px;cursor:pointer;}
.sub:hover{background:#F8FAFC;}
.ic{width:16px;height:16px;color:#64748B;display:inline-block;}
.item.active .ic{color:#4F46E5;}
</style></head><body>
<div class="side">
  <div class="logo">ReqDocs AI</div>
  <div class="nav">
    <div class="item active"><span class="ic">＋</span>새 프로젝트</div>
    <div class="group">최근 프로젝트</div>
    <div class="sub"><span class="ic">▤</span>쇼핑몰 리뉴얼 v2</div>
    <div class="sub"><span class="ic">▤</span>CRM 시스템</div>
    <div class="sub"><span class="ic">▤</span>배달 앱 기획</div>
    <div class="item" style="margin-top:10px;"><span class="ic">⚙</span>설정</div>
  </div>
</div>
</body></html>
