<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">

.n{font-size:12px;font-weight:600;color:var(--color-text);}

</style></head><body>
<div class="row">
  <div class="c"><div class="sw" style="background:#818CF8">PRD</div><div class="n">PRD</div><div class="v">#818CF8</div></div>

  <div class="c"><div class="sw" style="background:#60A5FA">Spec</div><div class="n">기능 명세</div><div class="v">#60A5FA</div></div>
  <div class="c"><div class="sw" style="background:#F472B6">API</div><div class="n">API 문서</div><div class="v">#F472B6</div></div>
  <div class="c"><div class="sw" style="background:#FB923C">ERD</div><div class="n">ERD</div><div class="v">#FB923C</div></div>
</div>
</body></html>
