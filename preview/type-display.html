<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#fff;font-family:var(--font-sans);padding:22px 26px;color:var(--color-text);}
.spec{display:flex;flex-direction:column;gap:14px;}
.row{display:flex;align-items:baseline;gap:16px;}
.label{width:80px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-sub);font-weight:600;flex-shrink:0;}
.d{font-size:60px;font-weight:700;line-height:1;letter-spacing:-.02em;}
.h1{font-size:30px;font-weight:700;line-height:1.2;}
.h2{font-size:24px;font-weight:600;line-height:1.3;}
.h3{font-size:20px;font-weight:600;line-height:1.3;}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--color-text-sub);}
</style></head><body>
<div class="spec">
  <div class="row"><span class="label">Display</span><span class="d">한 번에</span><span class="meta">60 / 700 / -0.02em</span></div>
  <div class="row"><span class="label">H1</span><span class="h1">요구사항 구조화 결과</span><span class="meta">30 / 700</span></div>
  <div class="row"><span class="label">H2</span><span class="h2">제품 개요</span><span class="meta">24 / 600</span></div>
  <div class="row"><span class="label">H3</span><span class="h3">생성할 문서</span><span class="meta">20 / 600</span></div>
</div>
</body></html>
