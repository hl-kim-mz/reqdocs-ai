<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#fff;font-family:var(--font-sans);padding:22px 26px;}
h4{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-sub);margin:0 0 10px;font-weight:600;}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.chip{font-size:12px;padding:4px 10px;border-radius:4px;border:1px solid;font-weight:500;}
.meth{display:inline-flex;align-items:center;padding:4px 10px;border-radius:4px;font-family:var(--font-mono);font-size:11px;font-weight:700;color:#fff;}
</style></head><body>
<h4>MoSCoW priority chips</h4>
<div class="row">
  <span class="chip" style="background:#FEE2E2;color:#B91C1C;border-color:#FECACA;">Must Have</span>
  <span class="chip" style="background:#FFEDD5;color:#C2410C;border-color:#FED7AA;">Should Have</span>
  <span class="chip" style="background:#FEF3C7;color:#A16207;border-color:#FDE68A;">Could Have</span>
  <span class="chip" style="background:#F1F5F9;color:#64748B;border-color:#E2E8F0;">Won't Have</span>
</div>
<h4>HTTP method chips</h4>
<div class="row">
  <span class="meth" style="background:#3B82F6;">GET</span>
  <span class="meth" style="background:#22C55E;">POST</span>
  <span class="meth" style="background:#F59E0B;">PUT</span>
  <span class="meth" style="background:#EF4444;">DELETE</span>
</div>
</body></html>
