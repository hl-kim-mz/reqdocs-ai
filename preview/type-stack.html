<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#fff;font-family:var(--font-sans);padding:22px 26px;color:var(--color-text);}
h4{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-sub);margin:0 0 10px;font-weight:600;}
.stack{font-size:16px;color:var(--slate-700);line-height:1.5;margin-bottom:14px;background:var(--slate-50);padding:10px 14px;border-radius:8px;border:1px solid var(--slate-200);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;}
.samples{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{border:1px solid var(--slate-200);border-radius:8px;padding:12px;}
.t{font-size:12px;font-weight:600;color:var(--slate-500);margin-bottom:8px;}
.ko{font-size:18px;font-weight:600;color:var(--slate-900);margin-bottom:4px;}
.en{font-size:14px;color:var(--slate-600);}
</style></head><body>
<h4>Font stack (system-native, no webfont)</h4>
<div class="stack">-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif</div>
<div class="samples">
  <div class="card"><div class="t">Korean (primary)</div><div class="ko">ReqDocs AI에 오신 것을 환영합니다</div><div class="en">한글 · 영문 · 숫자 0123456789</div></div>
  <div class="card"><div class="t">Latin + technical</div><div class="ko">Requirements to docs</div><div class="en">PRD · API · ERD · MoSCoW · OpenAPI 3.0</div></div>
</div>
</body></html>
