<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#fff;font-family:var(--font-sans);padding:22px 26px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.b{display:flex;align-items:center;gap:8px;}
.px{background:var(--brand-primary);}
.bar{height:18px;background:var(--brand-primary);border-radius:3px;}
.n{font-size:11px;font-weight:600;color:var(--color-text);}
.v{font-family:var(--font-mono);font-size:10px;color:var(--color-text-sub);}
</style></head><body>
<div class="grid">
  <div class="b"><div class="bar" style="width:4px"></div><div><div class="n">1 · 4px</div><div class="v">gap-1</div></div></div>
  <div class="b"><div class="bar" style="width:8px"></div><div><div class="n">2 · 8px</div><div class="v">chip gap</div></div></div>
  <div class="b"><div class="bar" style="width:12px"></div><div><div class="n">3 · 12px</div><div class="v">inner row</div></div></div>
  <div class="b"><div class="bar" style="width:16px"></div><div><div class="n">4 · 16px</div><div class="v">card padding</div></div></div>
  <div class="b"><div class="bar" style="width:20px"></div><div><div class="n">5 · 20px</div><div class="v">card gap</div></div></div>
  <div class="b"><div class="bar" style="width:24px"></div><div><div class="n">6 · 24px</div><div class="v">section gap</div></div></div>
  <div class="b"><div class="bar" style="width:32px"></div><div><div class="n">8 · 32px</div><div class="v">panel gap</div></div></div>
  <div class="b"><div class="bar" style="width:48px"></div><div><div class="n">12 · 48px</div><div class="v">marketing</div></div></div>
</div>
</body></html>
