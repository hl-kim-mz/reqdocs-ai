<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#F8FAFC;font-family:var(--font-sans);padding:16px 20px;color:#0F172A;}
.panel{width:280px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:16px;}
.eye{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#64748B;margin-bottom:6px;}
.kv{font-size:13px;display:flex;justify-content:space-between;padding:3px 0;color:#475569;}
.kv b{color:#0F172A;font-weight:600;}
.sep{height:1px;background:#E2E8F0;}
.row{display:flex;flex-direction:column;gap:6px;}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:8px;font-weight:500;font-size:13px;border:0;cursor:pointer;}
.btn-sec{background:#F1F5F9;color:#334155;} .btn-sec:hover{background:#E2E8F0;}
.btn-tint{background:#EEF2FF;color:#4F46E5;} .btn-tint:hover{background:#E0E7FF;}
</style></head><body>
<div class="panel">
  <div>
    <div class="eye">문서 정보</div>
    <div class="kv"><span>문서 타입</span><b>PRD</b></div>
    <div class="kv"><span>생성 시간</span><b>2026-04-20 14:32</b></div>
  </div>
  <div class="sep"></div>
  <div class="row">
    <button class="btn btn-sec">✎ 편집</button>
    <button class="btn btn-sec">↻ 재생성</button>
  </div>
  <div class="sep"></div>
  <div class="row">
    <button class="btn btn-tint">⧉ 마크다운 복사</button>
    <button class="btn btn-sec">⤓ 다운로드</button>
  </div>
  <div class="sep"></div>
  <div>
    <div class="eye">통계</div>
    <div class="kv"><span>글자 수</span><b>3,482</b></div>
    <div class="kv"><span>단어 수</span><b>521</b></div>
    <div class="kv"><span>문단 수</span><b>18</b></div>
  </div>
</div>
</body></html>
