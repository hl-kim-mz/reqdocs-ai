<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
body{margin:0;background:#F8FAFC;font-family:var(--font-sans);padding:16px 20px;}
.stack{display:flex;flex-direction:column;gap:10px;}
.banner{display:flex;gap:10px;padding:12px 16px;border-radius:8px;border:1px solid;align-items:flex-start;font-size:13px;}
.warn{background:#FFFBEB;border-color:#FDE68A;color:#B45309;}
.err{background:#FEF2F2;border-color:#FECACA;color:#B91C1C;}
.info{background:#EEF2FF;border-color:#C7D2FE;color:#4338CA;}
.banner .ic{font-size:14px;flex-shrink:0;margin-top:1px;}
.banner strong{display:block;margin-bottom:2px;font-weight:600;}
.banner p{margin:0;font-size:12px;opacity:.85;}
.close{margin-left:auto;cursor:pointer;opacity:.6;}
</style></head><body>
<div class="stack">
  <div class="banner warn">
    <span class="ic">⚠</span>
    <div><strong>입력이 너무 길어 앞 2000자만 분석했습니다.</strong><p>더 정확한 결과를 원하면 텍스트를 2000자 이내로 줄인 뒤 다시 시도하세요.</p></div>
    <span class="close">✕</span>
  </div>
  <div class="banner err"><span class="ic">✕</span><div><strong>이메일 또는 비밀번호가 올바르지 않습니다.</strong></div></div>
  <div class="banner info"><span class="ic">ℹ</span><div><strong>AI 요구사항 구조화</strong><p>입력을 분석하여 기능·비기능·제약으로 자동 분류합니다.</p></div></div>
</div>
</body></html>
